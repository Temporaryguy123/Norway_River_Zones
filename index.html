<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Norway River Zones</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1b2a;
      --surface: #112236;
      --border: #1e3a55;
      --accent: #4ab3e8;
      --accent2: #7dd3a8;
      --text: #e8f4f8;
      --muted: #7a9bb5;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(74,179,232,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(125,211,168,0.05) 0%, transparent 60%);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-top: 1rem;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 1.5rem auto 0;
      border-radius: 2px;
    }

    .map-list {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .map-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      padding: 1.1rem 1.5rem;
      gap: 1rem;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .map-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .map-item:hover {
      transform: translateX(4px);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(74,179,232,0.1);
    }

    .map-item:hover::before { opacity: 1; }

    .map-icon { font-size: 1.3rem; flex-shrink: 0; }

    .map-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      flex: 1;
    }

    .map-arrow {
      color: var(--accent);
      font-size: 1.1rem;
      transition: transform 0.2s ease;
    }

    .map-item:hover .map-arrow { transform: translateX(4px); }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Interactive Maps</p>
    <h1>Norway <span>River Zones</span></h1>
    <p class="subtitle">Select a map to explore</p>
    <div class="divider"></div>
  </header>

  <div class="map-list" id="mapList"></div>

  <footer>
    <p>Norway River Zones · Temporaryguy123</p>
  </footer>

  <script>
    // ============================================
    // ADD YOUR MAP FOLDER NAMES HERE
    // Just add the exact folder name as it appears
    // on GitHub, and a display name for the menu.
    // ============================================
    const maps = [
      { folder: "Forsand-Test",  name: "Forsand Test" },
      { folder: "Forsant-test2", name: "Forsand Test 2" },
      // { folder: "My-New-Map", name: "My New Map" },  ← example of how to add more
    ];
    // ============================================

    // Sort alphabetically by display name
    maps.sort((a, b) => a.name.localeCompare(b.name));

    const list = document.getElementById("mapList");
    maps.forEach(map => {
      const a = document.createElement("a");
      a.className = "map-item";
      a.href = `${map.folder}/index.html`;
      a.innerHTML = `
        <span class="map-icon">🗺️</span>
        <span class="map-name">${map.name}</span>
        <span class="map-arrow">→</span>
      `;
      list.appendChild(a);
    });
  </script>

</body>
</html>
