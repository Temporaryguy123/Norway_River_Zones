<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Norway River Zones</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1b2a;
      --surface: #112236;
      --border: #1e3a55;
      --accent: #4ab3e8;
      --accent2: #7dd3a8;
      --text: #e8f4f8;
      --muted: #7a9bb5;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(74,179,232,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(125,211,168,0.05) 0%, transparent 60%);
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-top: 1rem;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
      font-weight: 500;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 1.5rem auto 0;
      border-radius: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(74,179,232,0.12);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.5;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 1rem;
      font-size: 0.8rem;
      color: var(--accent);
      letter-spacing: 0.05em;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .card-arrow::after {
      content: '→';
      transition: transform 0.2s ease;
    }

    .card:hover .card-arrow::after {
      transform: translateX(4px);
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Interactive Maps</p>
    <h1>Norway <span>River Zones</span></h1>
    <p class="subtitle">Select a map to explore</p>
    <div class="divider"></div>
  </header>

  <div class="grid">

    <a class="card" href="Forsand-Test/index.html">
      <div class="card-icon">🗺️</div>
      <div class="card-title">Forsand Test</div>
      <div class="card-desc">River zone map for the Forsand area.</div>
      <div class="card-arrow">Open map</div>
    </a>

    <a class="card" href="Forsant-test2/index.html">
      <div class="card-icon">🗺️</div>
      <div class="card-title">Forsand Test 2</div>
      <div class="card-desc">River zone map for the Forsand area.</div>
      <div class="card-arrow">Open map</div>
    </a>

  </div>

  <footer>
    <p>Norway River Zones · Temporaryguy123</p>
  </footer>

</body>
</html>
